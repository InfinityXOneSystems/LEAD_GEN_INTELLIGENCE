name: Repo Sync — Branch Sync & Merge Guard

# Keeps the repository branches in sync and validates merge readiness.
# Triggers: manual dispatch, repository_dispatch (from GPT Actions / Copilot Mobile),
# or push to main (propagates changes to other key branches).

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (sync-pages|sync-dashboard|check-conflicts|full)'
        required: false
        default: 'full'
  repository_dispatch:
    types: [repo-sync, sync-branches]
  push:
    branches: [main]
    paths:
      - 'data/leads/**'
      - 'docs/**'

permissions:
  contents: write
  pull-requests: read
  issues: write

concurrency:
  group: repo-sync
  cancel-in-progress: true

jobs:
  # ── 1. (removed) Sync pages/data — legacy directories no longer tracked ─────
  sync-pages-data:
    name: Sync Pages Data (skip — legacy dirs removed)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: false   # legacy dashboard/pages directories removed; nothing to sync

    steps:
      - run: echo "Legacy sync skipped"

  # ── 2. Validate repo health ─────────────────────────────────────────────────
  validate-health:
    name: Validate Repository Health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate all workflows
        run: |
          FAIL=0
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              && echo "OK: $f" || { echo "FAIL: $f"; FAIL=1; }
          done
          exit $FAIL

      - name: Check for required files
        run: |
          MISSING=()
          REQUIRED=(
            "db/schema.sql"
            "db/db.js"
            "db/leadStore.js"
            "tools/export_snapshot.js"
            "validation/lead_validation_pipeline.js"
            "agents/gpt_actions/server.js"
            "agents/gpt_actions/openapi.json"
            "integrations/google_workspace.js"
            "docs/RUNBOOK.md"
          )
          for f in "${REQUIRED[@]}"; do
            [ -f "$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing required files:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All required files present ✓"

      - name: Check for UTF-16 encoded JS files
        run: |
          FOUND=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -q "UTF-16"; then
              echo "UTF-16 ENCODED: $f"
              FOUND=$((FOUND+1))
            fi
          done < <(find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.next/*" -print0)
          if [ "$FOUND" -gt 0 ]; then
            echo "WARNING: $FOUND UTF-16 encoded JS file(s) found. Auto-fix will be attempted."
          else
            echo "Encoding check passed ✓"
          fi

      - name: Auto-fix UTF-16 files
        if: always()
        run: |
          FIXED=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -q "UTF-16"; then
              iconv -f utf-16 -t utf-8 "$f" -o "${f}.utf8" 2>/dev/null && mv "${f}.utf8" "$f" && echo "Fixed: $f" && FIXED=$((FIXED+1))
            fi
          done < <(find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.next/*" -print0)
          echo "Fixed $FIXED UTF-16 file(s)"

      - name: Commit auto-fixed encoding
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No encoding fixes needed."
          else
            git commit -m "fix: convert UTF-16 JS files to UTF-8 [repo-sync]"
            git pull --rebase --autostash origin main || true
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Report Sync Status ────────────────────────────────────────────────────
  report:
    name: Sync Status Report
    runs-on: ubuntu-latest
    needs: [sync-pages-data, validate-health]
    if: always()

    steps:
      - name: Report results
        run: |
          echo "=== Repo Sync Status ==="
          echo "Trigger:         ${{ github.event_name }}"
          echo "Pages data sync: ${{ needs.sync-pages-data.result }}"
          echo "Health check:    ${{ needs.validate-health.result }}"
          if [ "${{ needs.validate-health.result }}" = "failure" ]; then
            echo "⚠️  Health validation failed — check the logs"
          else
            echo "✅ Repository is healthy and in sync"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Repo Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Pages Data | ${{ needs.sync-pages-data.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Health | ${{ needs.validate-health.result }} |" >> $GITHUB_STEP_SUMMARY
