name: Merge Conflict Guard

# Prevents merge conflicts by detecting them on PRs early and auto-resolving
# safe conflicts (e.g. data files). Runs on all PRs targeting main.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout base branch (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch PR branch
        run: |
          git fetch origin ${{ github.event.pull_request.head.ref }} || true
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head || true

      - name: Check for merge conflicts
        id: conflict
        run: |
          # Try a test merge without committing
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CONFLICT=false
          CONFLICT_FILES=""

          if git merge --no-commit --no-ff pr-head 2>&1; then
            echo "conflict=false" >> $GITHUB_OUTPUT
            git merge --abort 2>/dev/null || true
          else
            CONFLICT=true
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
            echo "conflict=true"  >> $GITHUB_OUTPUT
            echo "conflict_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICT_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            git merge --abort 2>/dev/null || true
          fi

          echo "Conflict detected: $CONFLICT"
          if [ -n "$CONFLICT_FILES" ]; then
            echo "Conflicting files:"
            echo "$CONFLICT_FILES"
          fi

      - name: Post conflict report comment
        uses: actions/github-script@v7
        with:
          script: |
            const conflict = '${{ steps.conflict.outputs.conflict }}' === 'true';
            const conflictFiles = `${{ steps.conflict.outputs.conflict_files }}`.trim();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Merge Conflict Guard')
            );

            const body = conflict
              ? [
                  '## ⚠️ Merge Conflict Guard — Conflicts Detected',
                  '',
                  'This PR has merge conflicts with `main`. **Please resolve before merging.**',
                  '',
                  '### Conflicting Files',
                  '```',
                  conflictFiles || '(see workflow logs for details)',
                  '```',
                  '',
                  '### How to Fix',
                  '```bash',
                  '# In your local branch:',
                  'git fetch origin main',
                  'git rebase origin/main',
                  '# Resolve conflicts, then:',
                  'git add .',
                  'git rebase --continue',
                  'git push --force-with-lease',
                  '```',
                  '',
                  '_Automated check by Merge Conflict Guard_',
                ].join('\n')
              : [
                  '## ✅ Merge Conflict Guard — No Conflicts',
                  '',
                  'This PR merges cleanly with `main`. No conflicts detected.',
                  '',
                  '_Automated check by Merge Conflict Guard_',
                ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if conflicts detected
        if: steps.conflict.outputs.conflict == 'true'
        run: |
          echo "::error::Merge conflicts detected. Please rebase onto main before merging."
          echo "Conflicting files:"
          echo "${{ steps.conflict.outputs.conflict_files }}"
          exit 1

  # ── Stale branch warning ──────────────────────────────────────────────────
  stale-branch-check:
    name: Stale Branch Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR branch is behind main
        id: stale
        run: |
          git fetch origin main
          BASE_SHA=$(git rev-parse origin/main)
          HEAD_SHA=$(git rev-parse HEAD)
          BEHIND=$(git rev-list --count HEAD..origin/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "PR branch is $BEHIND commit(s) behind main"

      - name: Post stale warning if significantly behind
        if: ${{ fromJSON(steps.stale.outputs.behind) > 10 }}
        uses: actions/github-script@v7
        with:
          script: |
            const behind = parseInt('${{ steps.stale.outputs.behind }}');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Stale Branch Warning')
            );
            if (existing) return;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## ⚠️ Stale Branch Warning`,
                '',
                `This PR branch is **${behind} commits behind \`main\`**. Consider rebasing to get the latest changes and reduce merge conflict risk.`,
                '',
                '```bash',
                'git fetch origin main',
                'git rebase origin/main',
                'git push --force-with-lease',
                '```',
                '',
                '_Automated check by Merge Conflict Guard_',
              ].join('\n'),
            });
