name: Deploy Backend to Railway

# GOVERNANCE: Tier 2 — Deployment
# Triggers on push to main. Runs tests first, then deploys backend to Railway.
#
# Required secrets:
#   RAILWAY_TOKEN — Railway API token (Settings → Tokens in Railway dashboard)
#
# Optional secrets (used for runtime; Railway also sets them via service variables):
#   DATABASE_URL, REDIS_URL, SECRET_KEY, GROQ_API_KEY, OPENAI_API_KEY

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Procfile"
      - "railway.json"
      - ".github/workflows/deploy-railway.yml"
  workflow_dispatch:

concurrency:
  group: deploy-railway
  cancel-in-progress: false

jobs:
  # ── Step 1: Run tests ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  # ── Step 2: Deploy to Railway ──────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: success()

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service backend \
            --detach \
            --yes
        working-directory: backend

      - name: Skip deploy (no token configured)
        if: ${{ secrets.RAILWAY_TOKEN == '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "[INFO] RAILWAY_TOKEN secret not set — skipping Railway deployment."
          echo "[INFO] To enable auto-deploy, add RAILWAY_TOKEN to repository secrets:"
          echo "[INFO]   GitHub → Settings → Secrets → Actions → New repository secret"

  # ── Step 3: Health check ───────────────────────────────────────────────────
  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    permissions: {}

    steps:
      - name: Wait for Railway to deploy
        run: sleep 20

      - name: Verify /health endpoint
        env:
          RAILWAY_BACKEND_URL: ${{ vars.RAILWAY_BACKEND_URL || 'https://xpsintelligencesystem-production.up.railway.app' }}
        run: |
          URL="${RAILWAY_BACKEND_URL}/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "[OK] Health check passed — backend is live at $URL"
          else
            echo "[WARN] Health check returned HTTP $HTTP_CODE — service may still be warming up"
          fi
        continue-on-error: true
