# Workflow for building and deploying the Next.js dashboard to GitHub Pages
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'dashboard/**'
      - 'data/**'
      - 'leads/**'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: dashboard/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-${{ hashFiles('dashboard/**.[jt]s', 'dashboard/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Copy latest lead data to public
        working-directory: ${{ github.workspace }}
        run: |
          cp -f data/scored_leads.json dashboard/public/data/scored_leads.json || true
          cp -f data/scoring_report.json dashboard/public/data/scoring_report.json || true

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
